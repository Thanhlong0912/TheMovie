<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Themovie logo</title>
  <desc id="desc">A warm film badge with the letters TM.</desc>
  <defs>
    <linearGradient id="badge" x1="80" y1="72" x2="432" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff4d3d"/>
      <stop offset="1" stop-color="#f4c542"/>
    </linearGradient>
    <linearGradient id="shine" x1="120" y1="92" x2="360" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity=".34"/>
      <stop offset=".42" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#08090d"/>
  <rect x="56" y="56" width="400" height="400" rx="76" fill="url(#badge)"/>
  <rect x="56" y="56" width="400" height="400" rx="76" fill="url(#shine)"/>
  <g fill="#0c0e14" opacity=".36">
    <rect x="92" y="120" width="30" height="36" rx="8"/>
    <rect x="92" y="194" width="30" height="36" rx="8"/>
    <rect x="92" y="268" width="30" height="36" rx="8"/>
    <rect x="92" y="342" width="30" height="36" rx="8"/>
    <rect x="390" y="120" width="30" height="36" rx="8"/>
    <rect x="390" y="194" width="30" height="36" rx="8"/>
    <rect x="390" y="268" width="30" height="36" rx="8"/>
    <rect x="390" y="342" width="30" height="36" rx="8"/>
  </g>
  <text x="256" y="306" fill="#0c0e14" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="900" text-anchor="middle">TM</text>
</svg>
